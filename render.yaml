services:
  - type: web
    name: intel-desk-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --workers 2 --timeout 120 --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ABUSEIPDB_KEY
        value: your_key_here
    healthCheckPath: /
