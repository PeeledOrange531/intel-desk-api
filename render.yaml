services:
  - type: web
    name: intel-desk-sanctions-proxy
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --timeout 120 --bind 0.0.0.0:$PORT
    envVars:
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: CACHE_TTL_SECONDS
        value: "21600"
    healthCheckPath: /health
