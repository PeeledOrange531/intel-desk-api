<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Intel Desk — OSINT & Investigative Tools</title>
<meta name="description" content="Free OSINT and investigative tools for journalists, researchers, and security professionals.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#050505;--bg2:#0d0d0d;--bg3:#141414;
  --border:rgba(255,255,255,0.09);--border-hover:rgba(255,255,255,0.22);
  --text:#f5f2ec;--text-muted:rgba(240,236,228,0.82);--text-dim:rgba(240,236,228,0.55);
  --accent:#c8a96e;--accent2:#e8d5a3;--accent-dim:rgba(200,169,110,0.15);
  --green:#4ec994;--orange:#e87b4a;--blue:#7eb8e4;--red:#c0392b;
  --sidebar-w:290px;--topbar-h:56px;--ticker-h:34px;
  --mono:'DM Mono',monospace;--serif:'Cormorant Garamond',Georgia,serif;--sans:'Syne',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:#050505!important;color:#f5f2ec!important;font-family:var(--sans);height:100vh;overflow:hidden;}
body *{color:inherit;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;opacity:0.5;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E");
  background-repeat:repeat;background-size:256px;}

/* ── SHELL ── */
.shell{
  position:fixed;inset:0;z-index:1;
  display:grid;
  grid-template-rows:var(--topbar-h) 1fr var(--ticker-h);
  grid-template-columns:var(--sidebar-w) 1fr;
  grid-template-areas:
    "topbar  topbar"
    "sidebar workspace"
    "ticker  ticker";
}

/* ── TOPBAR ── */
.topbar{
  grid-area:topbar;
  background:rgba(8,8,8,0.98);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;
  padding:0 0 0 0;gap:0;z-index:20;
}
.topbar-logo{
  display:flex;align-items:center;gap:0;
  flex-shrink:0;
  padding:0 22px;
  border-right:1px solid var(--border);
  height:100%;
}
.topbar-logo-text{
  font-family:var(--serif);font-size:20px;font-weight:400;
  color:#f5f2ec!important;white-space:nowrap;letter-spacing:0.01em;
}
.topbar-logo-text em{font-style:italic;color:#c8a96e!important;}
.topbar-badge{
  font-family:var(--mono);font-size:8px;font-weight:500;
  text-transform:uppercase;letter-spacing:0.16em;
  color:#c8a96e!important;border:1px solid rgba(200,169,110,0.30);
  padding:3px 8px;margin-left:10px;
}
.topbar-search{
  flex:1;display:flex;align-items:center;
  padding:0 18px;height:100%;
  border-right:1px solid var(--border);
  position:relative;
}
.search-icon{position:absolute;left:30px;font-size:13px;color:rgba(240,236,228,0.30)!important;pointer-events:none;}
.topbar-search input{
  width:100%;background:transparent;border:none;outline:none;
  font-family:var(--mono);font-size:13px;font-weight:400;
  color:#f5f2ec!important;padding:0 0 0 26px;letter-spacing:0.02em;
}
.topbar-search input::placeholder{color:rgba(240,236,228,0.28)!important;}
.search-dropdown{
  position:absolute;top:calc(100% + 1px);left:0;right:0;
  background:var(--bg2);border:1px solid var(--border);border-top:none;
  z-index:100;display:none;
}
.search-dropdown.open{display:block;}
.search-result-item{
  display:flex;align-items:center;gap:13px;padding:12px 20px;cursor:pointer;
  border-bottom:1px solid var(--border);transition:background 0.15s;
}
.search-result-item:last-child{border-bottom:none;}
.search-result-item:hover,.search-result-item.focused{background:rgba(200,169,110,0.07);}
.sr-icon{font-size:15px;flex-shrink:0;width:22px;text-align:center;}
.sr-name{font-family:var(--mono);font-size:12px;font-weight:500;color:#e8d5a3!important;}
.sr-desc{font-family:var(--mono);font-size:10px;color:rgba(240,236,228,0.42)!important;margin-top:2px;}
.search-empty{padding:16px 20px;font-family:var(--mono);font-size:11px;color:rgba(240,236,228,0.28)!important;text-align:center;}

.topbar-nav{display:flex;align-items:center;flex-shrink:0;height:100%;}
.topbar-nav a{
  font-family:var(--mono);font-size:10px;font-weight:500;
  text-transform:uppercase;letter-spacing:0.16em;
  color:rgba(240,236,228,0.50)!important;text-decoration:none;
  padding:0 20px;height:100%;display:flex;align-items:center;
  border-left:1px solid var(--border);transition:color 0.15s,background 0.15s;white-space:nowrap;
}
.topbar-nav a:hover{color:#c8a96e!important;background:rgba(200,169,110,0.05);}
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:0 18px;background:none;border:none;border-left:1px solid var(--border);height:100%;align-items:center;justify-content:center;}
.hamburger span{display:block;width:18px;height:1.5px;background:rgba(240,236,228,0.45);}

/* ── SIDEBAR ── */
.sidebar{
  grid-area:sidebar;background:var(--bg2);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;z-index:5;
}
.sidebar-scroll{flex:1;overflow-y:auto;padding:4px 0 8px;scrollbar-width:thin;scrollbar-color:rgba(200,169,110,0.15) transparent;}
.sidebar-scroll::-webkit-scrollbar{width:3px;}
.sidebar-scroll::-webkit-scrollbar-thumb{background:rgba(200,169,110,0.15);border-radius:2px;}

.nav-cat{
  font-family:var(--mono);font-size:9px;font-weight:500;
  text-transform:uppercase;letter-spacing:0.22em;
  color:rgba(240,236,228,0.28)!important;
  padding:14px 18px 7px;display:flex;align-items:center;gap:10px;
}
.nav-cat::after{content:'';flex:1;height:1px;background:var(--border);}

.tool-btn{
  width:100%;background:transparent;border:none;border-left:2px solid transparent;
  cursor:pointer;text-align:left;display:flex;align-items:center;
  transition:background 0.15s,border-color 0.15s;position:relative;
}
.tool-btn:hover{background:rgba(255,255,255,0.03);}
.tool-btn.active{background:rgba(200,169,110,0.07);border-left-color:var(--accent);}
.tool-btn.soon{opacity:0.42;cursor:default;}
.tool-btn.soon:hover{background:transparent;}

.tool-btn-inner{display:flex;align-items:center;gap:12px;padding:10px 16px 10px 14px;width:100%;}
.tool-icon{width:32px;height:32px;border:1px solid rgba(255,255,255,0.09);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;background:var(--bg);transition:all 0.15s;}
.tool-btn.active .tool-icon{border-color:rgba(200,169,110,0.35);background:rgba(200,169,110,0.09);}
.tool-btn:hover:not(.soon) .tool-icon{border-color:var(--border-hover);}
.tool-info{display:flex;flex-direction:column;gap:2px;min-width:0;}
.tool-name{font-family:var(--mono);font-size:11px;font-weight:500;color:rgba(240,236,228,0.75)!important;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:color 0.15s;}
.tool-btn.active .tool-name,.tool-btn:hover:not(.soon) .tool-name{color:#e8d5a3!important;}
.tool-desc{font-family:var(--mono);font-size:9px;color:rgba(240,236,228,0.35)!important;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tool-btn.active .tool-desc{color:rgba(200,169,110,0.50)!important;}
.tool-btn.active::after{content:'';position:absolute;right:12px;top:50%;transform:translateY(-50%);width:5px;height:5px;border-radius:50%;background:var(--accent);box-shadow:0 0 7px var(--accent);}
.soon-badge{font-family:var(--mono);font-size:8px;font-weight:500;text-transform:uppercase;letter-spacing:0.12em;color:rgba(240,236,228,0.22)!important;border:1px solid rgba(255,255,255,0.07);padding:1px 6px;margin-left:auto;flex-shrink:0;}

/* ── WORKSPACE ── */
.workspace{grid-area:workspace;position:relative;overflow:hidden;background:var(--bg);display:flex;flex-direction:column;}

/* WELCOME SCREEN */
.welcome{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  overflow:hidden;
  animation:fadeIn 0.5s ease both;
}
.welcome.hidden{display:none;}

/* Background pattern */
.welcome-bg{
  position:absolute;inset:0;
  background:
    linear-gradient(135deg, rgba(200,169,110,0.03) 0%, transparent 50%),
    radial-gradient(ellipse at 70% 50%, rgba(200,169,110,0.04) 0%, transparent 60%);
}
.welcome-grid-bg{
  position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
  background-size:48px 48px;
  mask-image:radial-gradient(ellipse at center, black 30%, transparent 75%);
}

.welcome-content{
  position:relative;z-index:1;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  flex:1;
  padding:48px;
  gap:32px;
}

.welcome-eyebrow{
  display:flex;align-items:center;gap:16px;
}
.welcome-eyebrow::before,.welcome-eyebrow::after{content:'';display:block;width:48px;height:1px;background:rgba(200,169,110,0.25);}
.welcome-eyebrow span{font-family:var(--mono);font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.24em;color:rgba(200,169,110,0.55)!important;}

.welcome-title{
  font-family:var(--serif);
  font-size:clamp(52px,7vw,96px);
  font-weight:300;line-height:0.9;
  text-align:center;color:#f5f2ec!important;
}
.welcome-title em{font-style:italic;color:#e8d5a3!important;}

.welcome-sub{
  font-family:var(--mono);font-size:13px;font-weight:400;
  color:rgba(240,236,228,0.50)!important;
  text-align:center;max-width:520px;line-height:1.9;
}

/* Stats row */
.welcome-stats{
  display:flex;gap:0;background:var(--border);
  border:1px solid var(--border);
}
.welcome-stat{
  padding:14px 32px;background:var(--bg2);
  display:flex;flex-direction:column;gap:4px;align-items:center;
  border-right:1px solid var(--border);
}
.welcome-stat:last-child{border-right:none;}
.ws-num{font-family:var(--serif);font-size:36px;font-weight:300;color:#c8a96e!important;line-height:1;}
.ws-lbl{font-family:var(--mono);font-size:9px;font-weight:500;text-transform:uppercase;letter-spacing:0.18em;color:rgba(240,236,228,0.35)!important;}

/* Divider line */
.welcome-divider{
  width:1px;height:60px;
  background:linear-gradient(to bottom, transparent, rgba(200,169,110,0.3), transparent);
}

/* CTA hint */
.welcome-cta{
  display:flex;align-items:center;gap:12px;
  font-family:var(--mono);font-size:11px;font-weight:500;
  color:rgba(240,236,228,0.30)!important;
  text-transform:uppercase;letter-spacing:0.16em;
}
.welcome-cta::before,.welcome-cta::after{content:'';display:block;width:24px;height:1px;background:rgba(255,255,255,0.10);}

/* Category chips */
.welcome-cats{display:flex;gap:1px;flex-wrap:wrap;justify-content:center;max-width:600px;}
.welcome-cat{
  font-family:var(--mono);font-size:10px;font-weight:500;
  text-transform:uppercase;letter-spacing:0.12em;
  color:rgba(240,236,228,0.35)!important;
  border:1px solid rgba(255,255,255,0.07);
  padding:6px 14px;background:var(--bg2);
  transition:all 0.15s;cursor:default;
}

/* SEO ACCORDION */
details.seo-acc{flex-shrink:0;border-bottom:1px solid var(--border);}
details.seo-acc summary{list-style:none;display:flex;align-items:center;gap:12px;padding:8px 24px;cursor:pointer;background:var(--bg3);transition:background 0.2s;user-select:none;}
details.seo-acc summary::-webkit-details-marker{display:none;}
details.seo-acc summary:hover{background:rgba(255,255,255,0.025);}
.seo-lbl{font-family:var(--mono);font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.16em;color:rgba(240,236,228,0.40)!important;flex:1;}
details[open] .seo-lbl{color:rgba(200,169,110,0.60)!important;}
.seo-plus{font-family:var(--mono);font-size:14px;color:rgba(200,169,110,0.35)!important;transition:transform 0.2s;line-height:1;width:16px;text-align:center;flex-shrink:0;}
details[open] .seo-plus{transform:rotate(45deg);}
.seo-body{background:var(--bg2);padding:16px 24px;border-top:1px solid var(--border);font-family:var(--mono);font-size:12px;line-height:1.9;color:rgba(240,236,228,0.55)!important;max-height:150px;overflow-y:auto;}
.seo-body strong{color:#e8d5a3!important;font-weight:500;}

/* LOADER */
.loader{position:absolute;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:10;transition:opacity 0.25s;}
.loader.hide{opacity:0;pointer-events:none;}
.loader-name{font-family:var(--serif);font-size:28px;font-weight:300;color:rgba(240,236,228,0.30)!important;}
.loader-dots{display:flex;gap:7px;}
.loader-dots span{width:6px;height:6px;border-radius:50%;background:rgba(200,169,110,0.35);animation:ldot 1.2s ease-in-out infinite;}
.loader-dots span:nth-child(2){animation-delay:0.2s;}
.loader-dots span:nth-child(3){animation-delay:0.4s;}

/* IFRAME */
.tool-iframe{flex:1;border:none;width:100%;background:var(--bg);display:none;min-height:0;}
.tool-iframe.visible{display:block;}

/* ── TICKER ── */
.ticker{
  grid-area:ticker;
  background:rgba(8,8,8,0.98);
  border-top:1px solid var(--border);
  display:flex;align-items:center;
  overflow:hidden;
  z-index:10;
  gap:0;
}
.ticker-segment{
  display:flex;align-items:center;
  padding:0 20px;height:100%;
  border-right:1px solid var(--border);
  flex-shrink:0;gap:10px;
}
.ticker-label{font-family:var(--mono);font-size:9px;font-weight:500;text-transform:uppercase;letter-spacing:0.16em;color:rgba(240,236,228,0.28)!important;}
.ticker-value{font-family:var(--mono);font-size:11px;font-weight:500;color:#c8a96e!important;}
.ticker-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:pulse-dot 2s ease-in-out infinite;flex-shrink:0;}

.ticker-scroll-wrap{flex:1;overflow:hidden;position:relative;height:100%;}
.ticker-scroll-inner{
  display:flex;align-items:center;height:100%;
  white-space:nowrap;
  animation:tickerScroll 40s linear infinite;
}
.ticker-scroll-inner:hover{animation-play-state:paused;}
.ticker-item{
  font-family:var(--mono);font-size:10px;font-weight:400;
  color:rgba(240,236,228,0.38)!important;
  padding:0 32px;
  display:inline-flex;align-items:center;gap:10px;
  border-right:1px solid rgba(255,255,255,0.05);
}
.ticker-item strong{color:rgba(200,169,110,0.65)!important;font-weight:500;}
.ticker-item .ti-dot{width:4px;height:4px;border-radius:50%;background:rgba(200,169,110,0.30);flex-shrink:0;}

@keyframes tickerScroll{from{transform:translateX(0);}to{transform:translateX(-50%);}}
@keyframes pulse-dot{0%,100%{opacity:1;box-shadow:0 0 6px var(--green);}50%{opacity:0.4;box-shadow:0 0 2px var(--green);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes ldot{0%,100%{opacity:0.2;}50%{opacity:1;}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

/* MOBILE */
@media(max-width:768px){
  .shell{grid-template-columns:1fr;grid-template-areas:"topbar" "workspace" "ticker";}
  .sidebar{position:fixed;top:var(--topbar-h);left:0;bottom:var(--ticker-h);width:290px;transform:translateX(-100%);transition:transform 0.25s cubic-bezier(0.4,0,0.2,1);z-index:20;}
  .sidebar.open{transform:translateX(0);}
  .hamburger{display:flex;}
  .topbar-nav a{padding:0 14px;font-size:9px;}
  .welcome-stats{flex-wrap:wrap;}
  .welcome-cats{display:none;}
}
</style>
</head>
<body>
<div class="shell">

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="topbar-logo">
      <span class="topbar-logo-text">The <em>Intel</em> Desk</span>
      <span class="topbar-badge">OSINT Suite</span>
    </div>
    <div class="topbar-search" id="searchWrap">
      <span class="search-icon">⌕</span>
      <input type="text" id="searchInput" placeholder="Search tools…" autocomplete="off" spellcheck="false"
        oninput="onSearch(this.value)" onkeydown="searchKey(event)" onfocus="openSearch()">
      <div class="search-dropdown" id="searchDropdown"></div>
    </div>
    <nav class="topbar-nav">
      <a href="#" onclick="loadPage('faq');return false;">FAQ</a>
      <a href="#" onclick="loadPage('terms');return false;">Terms</a>
      <a href="#" onclick="loadPage('contact');return false;">Contact</a>
    </nav>
    <button class="hamburger" onclick="toggleSidebar()"><span></span><span></span><span></span></button>
  </header>

  <!-- SIDEBAR -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-scroll" id="sidebarScroll"></div>
  </nav>

  <!-- WORKSPACE -->
  <main class="workspace" id="workspace">

    <!-- Welcome screen -->
    <div class="welcome" id="welcome">
      <div class="welcome-bg"></div>
      <div class="welcome-grid-bg"></div>
      <div class="welcome-content">
        <div class="welcome-eyebrow"><span>Open Source Intelligence</span></div>
        <div class="welcome-title">The <em>Intel</em><br>Desk</div>
        <div class="welcome-sub">
          A professional suite of investigative tools for journalists,<br>
          security researchers, and intelligence analysts.
        </div>
        <div class="welcome-stats" id="welcomeStats"></div>
        <div class="welcome-cta">Select a tool from the sidebar</div>
        <div class="welcome-cats" id="welcomeCats"></div>
      </div>
    </div>

    <!-- SEO accordion — hidden until tool loaded -->
    <details class="seo-acc" id="seoAcc" style="display:none">
      <summary>
        <span class="seo-lbl" id="seoLbl">About this tool</span>
        <span class="seo-plus">+</span>
      </summary>
      <div class="seo-body" id="seoBody"></div>
    </details>

    <!-- Loader -->
    <div class="loader hide" id="loader" style="display:none">
      <div class="loader-name" id="loaderName">Loading</div>
      <div class="loader-dots"><span></span><span></span><span></span></div>
    </div>

    <!-- Iframe -->
    <iframe class="tool-iframe" id="toolFrame"
      sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox"
    ></iframe>

  </main>

  <!-- TICKER -->
  <div class="ticker" id="ticker">
    <div class="ticker-segment">
      <div class="ticker-dot"></div>
      <span class="ticker-label">Live</span>
      <span class="ticker-value" id="tickerTools">—</span>
      <span class="ticker-label">Tools</span>
    </div>
    <div class="ticker-segment">
      <span class="ticker-label">Datasets</span>
      <span class="ticker-value" id="tickerDatasets">—</span>
    </div>
    <div class="ticker-scroll-wrap">
      <div class="ticker-scroll-inner" id="tickerScroll"></div>
    </div>
  </div>

</div>
<script>
// ── TOOL REGISTRY ─────────────────────────────────────────────────────────────
const BASE = 'https://peeledorange531.github.io/intel-desk-api';
const PAGES_BASE = 'https://peeledorange531.github.io/intel-desk-api/pages';

const CATEGORIES = [
  {
    id: 'email-comms',
    label: 'Email & Communications',
    tools: [
      {
        id:'email', icon:'✉️', live:true,
        name:'Email Header Analyzer',
        desc:'Trace server hops, detect spoofing',
        url:`${BASE}/email-header-analyzer.html`,
        datasets: 0,
        seo:`Every email carries a hidden trail of metadata. This tool decodes raw email headers to <strong>trace the full server hop chain</strong>, extract <strong>originating IP addresses</strong>, and evaluate <strong>SPF, DKIM, and DMARC</strong> authentication. Detects spoofing, phishing, and business email compromise.`,
      },
    ],
  },
  {
    id: 'documents',
    label: 'Documents & Files',
    tools: [
      {
        id:'exif', icon:'📷', live:true,
        name:'EXIF Data Extractor',
        desc:'GPS, camera data & image metadata',
        url:`${BASE}/exif-extractor.html`,
        datasets: 0,
        seo:`Every photograph contains hidden <strong>EXIF metadata</strong> — camera model, settings, timestamp, and <strong>precise GPS coordinates</strong>. This tool extracts all metadata and plots any GPS location on an interactive dark map.`,
      },
      {
        id:'docs', icon:'📄', live:true,
        name:'PDF & DOCX Metadata',
        desc:'Author, timestamps & revision history',
        url:`${BASE}/metadata-extractor.html`,
        datasets: 0,
        seo:`PDF and Word documents carry hidden metadata — <strong>original author name</strong>, <strong>creator software</strong>, <strong>timestamps</strong>, and a full <strong>revision history timeline</strong>. Flags forensic anomalies including date paradoxes and software fingerprint conflicts.`,
      },
    ],
  },
  {

// Flatten live tools for search
const ALL_TOOLS = CATEGORIES.flatMap(c => c.tools);
const LIVE_TOOLS = ALL_TOOLS.filter(t => t.live);
const TOTAL_DATASETS = ALL_TOOLS.reduce((n, t) => n + (t.datasets || 0), 0);

// ── BUILD SIDEBAR ─────────────────────────────────────────────────────────────
let current = null;

function buildSidebar() {
  const scroll = document.getElementById('sidebarScroll');
  scroll.innerHTML = CATEGORIES.map((cat, ci) => `
    <div class="nav-cat">${cat.label}</div>
    ${cat.tools.map((t, ti) => `
      <button
        class="tool-btn${t.live ? '' : ' soon'}"
        id="btn-${t.id}"
        onclick="${t.live ? `loadTool('${t.id}')` : ''}"
        style="animation:fadeUp 0.35s ${(ci*2+ti)*0.05}s ease both;opacity:0"
      >
        <div class="tool-btn-inner">
          <div class="tool-icon">${t.icon}</div>
          <div class="tool-info">
            <div class="tool-name">${t.name}</div>
            <div class="tool-desc">${t.desc}</div>
          </div>
          ${!t.live ? '<span class="soon-badge">Soon</span>' : ''}
        </div>
      </button>`).join('')
    }`).join('');
}

// ── BUILD WELCOME ─────────────────────────────────────────────────────────────
function buildWelcome() {
  // Stats
  document.getElementById('welcomeStats').innerHTML = `
    <div class="welcome-stat"><div class="ws-num">${LIVE_TOOLS.length}</div><div class="ws-lbl">Live Tools</div></div>
    <div class="welcome-stat"><div class="ws-num">${ALL_TOOLS.length}</div><div class="ws-lbl">Total Tools</div></div>
    <div class="welcome-stat"><div class="ws-num">${TOTAL_DATASETS}</div><div class="ws-lbl">Datasets</div></div>

// ── BUILD TICKER ──────────────────────────────────────────────────────────────

    { label: 'PDF/DOCX Forensics', value: 'Revision history' },

    { label: 'what3words API', value: 'Bidirectional lookup' },
    { label: 'Match Confidence Scoring', value: '0–100 scale' },

// ── LOAD TOOL ─────────────────────────────────────────────────────────────────
function loadTool(id) {
  const t = ALL_TOOLS.find(t => t.id === id);
  if (!t || !t.live || current === id) return;
  current = id;

  // Sidebar
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`btn-${id}`)?.classList.add('active');

  // Hide welcome, show tool UI
  document.getElementById('welcome').classList.add('hidden');
  document.getElementById('seoAcc').style.display = '';
  document.getElementById('seoLbl').textContent = `About: ${t.name}`;
  document.getElementById('seoBody').innerHTML = t.seo || '';
  document.getElementById('seoAcc').removeAttribute('open');

  // Loader
  const loader = document.getElementById('loader');
  const frame  = document.getElementById('toolFrame');
  loader.style.display = 'flex';
  loader.classList.remove('hide');
  document.getElementById('loaderName').textContent = t.name;

  frame.classList.remove('visible');
  frame.src = '';
  frame.onload = () => {
    loader.classList.add('hide');
    frame.classList.add('visible');
    setTimeout(() => { loader.style.display = 'none'; }, 280);
  };
  setTimeout(() => { frame.src = t.url; }, 30);

  document.getElementById('sidebar').classList.remove('open');
  history.replaceState(null, '', `#${id}`);
}

// ── SEARCH ────────────────────────────────────────────────────────────────────
let searchFocus = -1;
let filtered = [...LIVE_TOOLS];

function onSearch(val) {
  const q = val.trim().toLowerCase();
  searchFocus = -1;
  filtered = q ? LIVE_TOOLS.filter(t =>
    t.name.toLowerCase().includes(q) || t.desc.toLowerCase().includes(q)
  ) : [...LIVE_TOOLS];
  renderDropdown();
  document.getElementById('searchDropdown').classList.add('open');
}

function renderDropdown() {
  const dd = document.getElementById('searchDropdown');
  if (!filtered.length) {
    dd.innerHTML = `<div class="search-empty">No tools match your search</div>`;
    return;
  }
  dd.innerHTML = filtered.map((t,i) => `
    <div class="search-result-item" data-idx="${i}"
      onclick="loadTool('${t.id}')"
      onmouseenter="searchFocus=${i};highlightItem()">
      <span class="sr-icon">${t.icon}</span>
      <div>
        <div class="sr-name">${t.name}</div>
        <div class="sr-desc">${t.desc}</div>
      </div>
    </div>`).join('');
}

function highlightItem() {
  document.querySelectorAll('.search-result-item').forEach((el,i) => el.classList.toggle('focused', i === searchFocus));
}

function searchKey(e) {
  const items = document.querySelectorAll('.search-result-item');
  if (e.key==='ArrowDown'){e.preventDefault();searchFocus=Math.min(searchFocus+1,items.length-1);highlightItem();}
  else if(e.key==='ArrowUp'){e.preventDefault();searchFocus=Math.max(searchFocus-1,0);highlightItem();}
  else if(e.key==='Enter'){if(searchFocus>=0&&filtered[searchFocus]){loadTool(filtered[searchFocus].id);document.getElementById('searchInput').value='';}}
  else if(e.key==='Escape'){closeSearch();}
}

function openSearch(){filtered=[...LIVE_TOOLS];renderDropdown();document.getElementById('searchDropdown').classList.add('open');}
function closeSearch(){document.getElementById('searchDropdown').classList.remove('open');searchFocus=-1;}
document.addEventListener('click',e=>{if(!document.getElementById('searchWrap').contains(e.target))closeSearch();});

// ── MOBILE ────────────────────────────────────────────────────────────────────
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');}

    contact: 'Get in touch with The Intel Desk team. Report bugs, suggest tools, or ask questions.',
  };

  // Clear sidebar active state
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
  current = null;

  // Update SEO accordion
  document.getElementById('seoAcc').style.display = '';
  document.getElementById('seoLbl').textContent = names[id];
  document.getElementById('seoBody').innerHTML   = seo[id];
  document.getElementById('seoAcc').removeAttribute('open');

  // Hide welcome
  document.getElementById('welcome').classList.add('hidden');

  // Loader
  const loader = document.getElementById('loader');
  const frame  = document.getElementById('toolFrame');
  loader.style.display = 'flex';
  loader.classList.remove('hide');
  document.getElementById('loaderName').textContent = names[id];

  frame.classList.remove('visible');
  frame.src = '';
  frame.onload = () => { loader.classList.add('hide'); frame.classList.add('visible'); setTimeout(()=>loader.style.display='none',280); };
  setTimeout(() => { frame.src = `${PAGES_BASE}/${id}.html`; }, 30);

  document.getElementById('sidebar').classList.remove('open');
  history.replaceState(null, '', `#${id}`);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
buildSidebar();
buildWelcome();
buildTicker();

const hash = location.hash.slice(1);
if (hash && ALL_TOOLS.find(t => t.id === hash && t.live)) loadTool(hash);
</script>
